name: K6 Performance Test

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install K6
        run: |
          sudo apt update
          sudo apt install -y gnupg software-properties-common
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt update
          sudo apt install -y k6

      - name: Run Load Test (Lead Journey)
        run: |
          mkdir -p reports

          k6 run \
            --out json=reports/result.json \
            scenarios/lead/leadJourneyScenario.js

      - name: Generate HTML Report
        run: |
          npm init -y
          npm install k6-reporter

          node -e "
          const fs = require('fs');
          const reporter = require('k6-reporter').default;

          const data = JSON.parse(fs.readFileSync('reports/result.json'));
          const html = reporter.generateHtmlReport(data);

          fs.writeFileSync('reports/report.html', html);
          "

      - name: Upload HTML Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: reports/report.html
